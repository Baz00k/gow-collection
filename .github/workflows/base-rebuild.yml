name: Rebuild Dependent Images

# Bump every image that pins the shared base image
# (BASE_APP_IMAGE -> ghcr.io/<owner>/gow-collection/base) to the latest published
# digest. Committing that pins.env change triggers images.yml, which rebuilds
# exactly the affected app images. This workflow is the only writer of app
# BASE_APP_IMAGE pins.
#
# This workflow is called by images.yml after the base image is actually included
# in the build matrix and that matrix job succeeds on main. It is also manually
# dispatchable for recovery/backfill.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  bump-dependents:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BASE_IMAGE: ghcr.io/${{ github.repository_owner }}/gow-collection/base
      BASE_IMAGE_TAG: edge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Bump dependent base digests
        id: bump
        run: |
          set -euo pipefail
          export BASE_IMAGE="${BASE_IMAGE,,}"   # GHCR repos are lowercase

          source images/base/update/lib/base-digest.sh

          latest_digest=$(fetch_remote_digest "${BASE_IMAGE}:${BASE_IMAGE_TAG}" || true)
          if [[ -z "$latest_digest" ]]; then
            echo "::error::Could not resolve digest for ${BASE_IMAGE}:${BASE_IMAGE_TAG}"
            exit 1
          fi

          new_base_image="${BASE_IMAGE}:${BASE_IMAGE_TAG}@${latest_digest}"
          echo "Resolved base image: ${new_base_image}"

          all_summaries=""
          changed=false

          for pins in images/*/build/pins.env; do
            image_dir=$(dirname "$pins" | xargs dirname)
            name=$(basename "$image_dir")

            # Only images that pin OUR base image.
            grep -q "^BASE_APP_IMAGE=${BASE_IMAGE}:" "$pins" || continue

            current_base=$(grep '^BASE_APP_IMAGE=' "$pins" | head -1 | cut -d= -f2-)
            if [[ "$current_base" == "$new_base_image" ]]; then
              echo "${name} already pins ${latest_digest}"
              continue
            fi

            echo "Bumping base digest for ${name}: ${current_base} -> ${new_base_image}"
            sed "s|^BASE_APP_IMAGE=.*|BASE_APP_IMAGE=${new_base_image}|" "$pins" > "${pins}.tmp"
            mv "${pins}.tmp" "$pins"

            if ! git diff --quiet -- "$pins"; then
              changed=true
              all_summaries+="## ${name}\n\nBumped base image to \`${latest_digest}\`.\n\n"
            fi
          done

          if [[ "$changed" == "true" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "summaries<<EOF"
              printf "%b" "$all_summaries"
              echo
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependent images needed a base digest bump"
          fi

      - name: Generate PR body
        if: steps.bump.outputs.changed == 'true'
        run: |
          cat > /tmp/pr-body.md << 'HEADER'
          ## Base Image Rebuild

          The shared base image was rebuilt and published. The following images were
          bumped to the new base digest and will rebuild automatically once merged.

          HEADER
          printf "%b" '${{ steps.bump.outputs.summaries }}' >> /tmp/pr-body.md
          cat >> /tmp/pr-body.md << 'FOOTER'

          ---

          *Auto-generated by base-rebuild workflow*
          FOOTER

      - name: Generate GitHub App token
        if: steps.bump.outputs.changed == 'true'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GOW_UPDATER_APP_ID }}
          private-key: ${{ secrets.GOW_UPDATER_PRIVATE_KEY }}

      - name: Create PR
        if: steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: bump dependent images to new base digest"
          title: "chore: bump dependent images to new base digest"
          body-path: /tmp/pr-body.md
          branch: auto-update/base-digest
          labels: automated, dependencies
          delete-branch: true
