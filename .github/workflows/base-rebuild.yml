name: Rebuild Dependent Images

# Bump every image that pins the shared base image
# (BASE_APP_IMAGE -> ghcr.io/<owner>/gow-collection/base) to the latest published
# digest. Committing that pins.env change triggers images.yml, which rebuilds
# exactly the affected app images.
#
# This workflow is called by images.yml after the base image is actually included
# in the build matrix and that matrix job succeeds on main. It is also manually
# dispatchable for recovery/backfill.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  bump-dependents:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BASE_IMAGE: ghcr.io/${{ github.repository_owner }}/gow-collection/base
      BASE_IMAGE_TAG: edge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Bump dependent base digests
        id: bump
        run: |
          set -euo pipefail
          export BASE_IMAGE="${BASE_IMAGE,,}"   # GHCR repos are lowercase

          all_summaries=""
          changed=false

          for pins in images/*/build/pins.env; do
            image_dir=$(dirname "$pins" | xargs dirname)
            name=$(basename "$image_dir")

            # Only images that pin OUR base image.
            grep -q "^BASE_APP_IMAGE=${BASE_IMAGE}:" "$pins" || continue

            apply="${image_dir}/update/apply.sh"
            [[ -x "$apply" ]] || { echo "::warning::${name} pins base but has no update/apply.sh"; continue; }

            echo "Bumping base digest for ${name}..."
            temp_output=$(mktemp)
            PINS_FILE="$pins" BASE_IMAGE="$BASE_IMAGE" BASE_IMAGE_TAG="$BASE_IMAGE_TAG" \
              GITHUB_OUTPUT="$temp_output" bash "$apply"

            applied=$(grep '^applied=' "$temp_output" | cut -d'=' -f2 || echo "false")
            if [[ "$applied" == "true" ]] && ! git diff --quiet -- "$pins"; then
              changed=true
              all_summaries+="## ${name}\n\nBumped to the latest base image digest.\n\n"
            fi
            rm -f "$temp_output"
          done

          if [[ "$changed" == "true" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "summaries<<EOF"
              printf "%b" "$all_summaries"
              echo
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependent images needed a base digest bump"
          fi

      - name: Generate PR body
        if: steps.bump.outputs.changed == 'true'
        run: |
          cat > /tmp/pr-body.md << 'HEADER'
          ## Base Image Rebuild

          The shared base image was rebuilt and published. The following images were
          bumped to the new base digest and will rebuild automatically once merged.

          HEADER
          printf "%b" '${{ steps.bump.outputs.summaries }}' >> /tmp/pr-body.md
          cat >> /tmp/pr-body.md << 'FOOTER'

          ---

          *Auto-generated by base-rebuild workflow*
          FOOTER

      - name: Create PR
        if: steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump dependent images to new base digest"
          title: "chore: bump dependent images to new base digest"
          body-path: /tmp/pr-body.md
          branch: auto-update/base-digest
          labels: automated, dependencies
          delete-branch: true
