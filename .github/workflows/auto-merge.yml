name: Auto-merge Automated PRs

# Merge only automated PRs whose exact head SHA has passed the required build
# and policy workflows. This is stricter than relying only on GitHub's
# auto-merge queue, which can be unsafe if branch protection is misconfigured.
on:
  pull_request_target:
    types: [opened, reopened, labeled, synchronize]
  workflow_run:
    workflows: [Build Images, Policy Check]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  merge-automated-prs:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GOW_UPDATER_APP_ID }}
          private-key: ${{ secrets.GOW_UPDATER_PRIVATE_KEY }}

      - name: Merge automated PRs after required checks pass
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          required_workflows=("Build Images" "Policy Check")

          workflow_status() {
            local workflow_name="$1"
            local head_sha="$2"
            gh api --method GET "repos/${REPO}/actions/runs" \
              -f head_sha="${head_sha}" \
              --jq ".workflow_runs[] | select(.name == \"${workflow_name}\") | select(.status == \"completed\") | .conclusion" \
              | head -1
          }

          merge_if_ready() {
            local pr_number="$1"
            local pr_json head_sha state labels

            pr_json=$(gh pr view "${pr_number}" --repo "${REPO}" --json number,state,isDraft,headRefOid,labels,mergeStateStatus)
            state=$(jq -r '.state' <<< "${pr_json}")
            [[ "${state}" == "OPEN" ]] || { echo "PR #${pr_number} is not open; skipping"; return 0; }

            if [[ "$(jq -r '.isDraft' <<< "${pr_json}")" == "true" ]]; then
              echo "PR #${pr_number} is draft; skipping"
              return 0
            fi

            labels=$(jq -r '.labels[].name' <<< "${pr_json}")
            if ! grep -qx 'automated' <<< "${labels}"; then
              echo "PR #${pr_number} is not labeled automated; skipping"
              return 0
            fi

            head_sha=$(jq -r '.headRefOid' <<< "${pr_json}")
            echo "Checking required workflows for PR #${pr_number} at ${head_sha}"

            for workflow in "${required_workflows[@]}"; do
              conclusion=$(workflow_status "${workflow}" "${head_sha}" || true)
              if [[ -z "${conclusion}" ]]; then
                echo "${workflow}: no completed run for ${head_sha}; not merging yet"
                return 0
              fi
              if [[ "${conclusion}" != "success" ]]; then
                echo "${workflow}: ${conclusion}; refusing to merge PR #${pr_number}"
                return 0
              fi
              echo "${workflow}: success"
            done

            echo "All required workflows passed; squash-merging PR #${pr_number}"
            gh pr merge "${pr_number}" --repo "${REPO}" --squash --delete-branch
          }

          if [[ "${{ github.event_name }}" == "pull_request_target" ]]; then
            merge_if_ready "${{ github.event.pull_request.number }}"
            exit 0
          fi

          # A workflow_run completion does not directly provide the PR number for
          # all event shapes, so scan open automated PRs and merge whichever are
          # ready. This keeps pending/failing PRs untouched.
          gh pr list --repo "${REPO}" --state open --label automated --json number --jq '.[].number' \
            | while read -r pr_number; do
                [[ -n "${pr_number}" ]] || continue
                merge_if_ready "${pr_number}"
              done
