name: Auto-merge Automated PRs

# Enables GitHub's native auto-merge for PRs labeled `automated` (e.g. Dependabot
# action bumps). It only flips the auto-merge switch — branch protection's
# required `ci-gate` check decides if/when the PR actually merges.
#
# Deliberately minimal: no PR code is checked out or executed, no status polling,
# no scanning of other PRs. update.yml enables auto-merge on its own PRs directly,
# so this workflow mainly covers Dependabot.

on:
    pull_request_target:
        types: [labeled]

permissions:
    contents: write
    pull-requests: write

jobs:
    enable-auto-merge:
        name: enable native auto-merge
        if: github.event.label.name == 'automated'
        runs-on: ubuntu-latest
        steps:
            - name: Generate GitHub App token
              id: app-token
              uses: actions/create-github-app-token@v2
              with:
                  app-id: ${{ secrets.GOW_UPDATER_APP_ID }}
                  private-key: ${{ secrets.GOW_UPDATER_PRIVATE_KEY }}

            - name: Enable auto-merge
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  gh pr merge "${{ github.event.pull_request.number }}" \
                    --repo "${{ github.repository }}" --auto --squash --delete-branch
