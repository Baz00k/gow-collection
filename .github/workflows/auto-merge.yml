name: Auto-merge Automated PRs

# Enables auto-merge for automated dependency/base-rebuild PRs. GitHub will only
# complete the merge once all required status checks (the image builds + smoke
# tests from images.yml and the policy check) pass, so this never merges a PR
# whose tests are failing.
#
# Requires branch protection on main with required status checks configured.
on:
  pull_request:
    types: [opened, reopened, labeled, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    # Only PRs we generated automatically.
    if: >-
      github.actor == 'github-actions[bot]' ||
      contains(github.event.pull_request.labels.*.name, 'automated')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Enable auto-merge (squash)
        run: |
          set -euo pipefail
          echo "Enabling auto-merge for PR #${{ github.event.pull_request.number }}"
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --squash --auto
