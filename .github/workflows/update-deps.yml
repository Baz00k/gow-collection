name: Update Dependencies

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      base-update: ${{ steps.base.outputs.update-available }}
      prism-update: ${{ steps.prism.outputs.update-available }}
      drop-update: ${{ steps.drop.outputs.update-available }}
      new-base: ${{ steps.base.outputs.new-digest }}
      current-base: ${{ steps.base.outputs.current-digest }}
      current-prism: ${{ steps.prism.outputs.current-version }}
      new-prism: ${{ steps.prism.outputs.new-version }}
      current-drop: ${{ steps.drop.outputs.current-version }}
      new-drop: ${{ steps.drop.outputs.new-version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check base image
        id: base
        env:
          PINS_FILE: images/prism-offline/build/pins.env
        run: .github/scripts/check-base-image.sh

      - name: Check Prism Launcher
        id: prism
        env:
          PINS_FILE: images/prism-offline/build/pins.env
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/check-prism.sh

      - name: Check drop-app
        id: drop
        env:
          PINS_FILE: images/drop-app/build/pins.env
        run: .github/scripts/check-drop-app.sh

  update:
    needs: check-updates
    if: needs.check-updates.outputs.base-update == 'true' || needs.check-updates.outputs.prism-update == 'true' || needs.check-updates.outputs.drop-update == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update base image (prism-offline)
        if: needs.check-updates.outputs.base-update == 'true'
        env:
          PINS_FILE: images/prism-offline/build/pins.env
        run: .github/scripts/update-base-image.sh "${{ needs.check-updates.outputs.new-base }}"

      - name: Update base image (drop-app)
        if: needs.check-updates.outputs.base-update == 'true'
        env:
          PINS_FILE: images/drop-app/build/pins.env
        run: .github/scripts/update-base-image.sh "${{ needs.check-updates.outputs.new-base }}"

      - name: Update Prism Launcher
        id: prism
        if: needs.check-updates.outputs.prism-update == 'true'
        env:
          PINS_FILE: images/prism-offline/build/pins.env
        run: .github/scripts/update-prism.sh "${{ needs.check-updates.outputs.new-prism }}"

      - name: Update drop-app
        id: drop
        if: needs.check-updates.outputs.drop-update == 'true'
        env:
          PINS_FILE: images/drop-app/build/pins.env
        run: .github/scripts/update-drop-app.sh "${{ needs.check-updates.outputs.new-drop }}"

      - name: Generate PR body
        id: body
        run: |
          cat > /tmp/pr-body.md << 'HEADER'
          ## Dependency Updates
          HEADER

          if [ "${{ needs.check-updates.outputs.base-update }}" = "true" ]; then
            cat >> /tmp/pr-body.md << EOF

          ### Base Image (both images)

          | Field | Value |
          |-------|-------|
          | Previous | \`${{ needs.check-updates.outputs.current-base }}\` |
          | New | \`${{ needs.check-updates.outputs.new-base }}\` |
          EOF
          fi

          if [ "${{ needs.check-updates.outputs.prism-update }}" = "true" ]; then
            cat >> /tmp/pr-body.md << EOF

          ### Prism Launcher

          Updated from v${{ needs.check-updates.outputs.current-prism }} to v${{ needs.check-updates.outputs.new-prism }}.
          EOF
          fi

          if [ "${{ needs.check-updates.outputs.drop-update }}" = "true" ]; then
            cat >> /tmp/pr-body.md << EOF

          ### Drop App

          Updated from v${{ needs.check-updates.outputs.current-drop }} to v${{ needs.check-updates.outputs.new-drop }}.
          EOF
          fi

          cat >> /tmp/pr-body.md << 'FOOTER'

          ---

          *Auto-generated by update-deps workflow*
          FOOTER

          echo "file=/tmp/pr-body.md" >> "$GITHUB_OUTPUT"

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update dependencies"
          title: "chore: update dependencies"
          body-path: /tmp/pr-body.md
          branch: auto-update/deps-${{ github.run_number }}
          labels: automated, dependencies
          delete-branch: true

  no-updates:
    needs: check-updates
    if: needs.check-updates.outputs.base-update != 'true' && needs.check-updates.outputs.prism-update != 'true' && needs.check-updates.outputs.drop-update != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "All dependencies up to date"
