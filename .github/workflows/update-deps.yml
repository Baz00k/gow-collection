name: Update Dependencies

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      updates: ${{ steps.discover.outputs.updates }}
      summaries: ${{ steps.discover.outputs.summaries }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Discover and check image updates
        id: discover
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          updates_json="[]"
          all_summaries=""

          for check_script in images/*/update/check.sh; do
            [[ -x "$check_script" ]] || continue
            
            image_dir=$(dirname "$check_script" | xargs dirname | xargs basename)
            apply_script="images/${image_dir}/update/apply.sh"
            
            if [[ ! -x "$apply_script" ]]; then
              echo "::warning::Found check.sh but no apply.sh for ${image_dir}"
              continue
            fi

            echo "Checking ${image_dir}..."
            temp_output=$(mktemp)
            
            GITHUB_OUTPUT="$temp_output" bash "$check_script"
            
            update_available=$(grep '^update_available=' "$temp_output" | cut -d'=' -f2 || echo "false")
            
            if [[ "$update_available" == "true" ]]; then
              echo "Update available for ${image_dir}"
              updates_json=$(echo "$updates_json" | jq -c --arg img "$image_dir" '. + [$img]')
              
              summary=$(sed -n '/^summary_md<<EOF$/,/^EOF$/p' "$temp_output" | sed '1d;$d')
              if [[ -n "$summary" ]]; then
                all_summaries+="## ${image_dir}\n\n${summary}\n\n"
              fi
            else
              echo "No updates for ${image_dir}"
            fi
            
            rm -f "$temp_output"
          done

          updates_json=$(printf '%s' "$updates_json" | jq -c '.')
          echo "updates=${updates_json}" >> "$GITHUB_OUTPUT"
          {
            echo "summaries<<EOF"
            printf "%b" "$all_summaries"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          
          echo "Images with updates: ${updates_json}"

  update:
    needs: check-updates
    if: needs.check-updates.outputs.updates != '[]'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Apply updates
        id: apply
        run: |
          updates='${{ needs.check-updates.outputs.updates }}'
          all_summaries=""
          
          for image_dir in $(echo "$updates" | jq -r '.[]'); do
            echo "Applying updates for ${image_dir}..."
            temp_output=$(mktemp)
            
            GITHUB_OUTPUT="$temp_output" bash "images/${image_dir}/update/apply.sh"
            
            applied=$(grep '^applied=' "$temp_output" | cut -d'=' -f2 || echo "false")
            
            if [[ "$applied" == "true" ]]; then
              echo "Updates applied for ${image_dir}"
              summary=$(sed -n '/^summary_md<<EOF$/,/^EOF$/p' "$temp_output" | sed '1d;$d')
              if [[ -n "$summary" ]]; then
                all_summaries+="## ${image_dir}\n\n${summary}\n\n"
              fi
            fi
            
            rm -f "$temp_output"
          done
          
          {
            echo "summaries<<EOF"
            printf "%b" "$all_summaries"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate PR body
        id: body
        run: |
          cat > /tmp/pr-body.md << 'HEADER'
          ## Dependency Updates
          HEADER

          summaries='${{ steps.apply.outputs.summaries }}'
          echo -e "$summaries" >> /tmp/pr-body.md

          cat >> /tmp/pr-body.md << 'FOOTER'

          ---

          *Auto-generated by update-deps workflow*
          FOOTER

          echo "file=/tmp/pr-body.md" >> "$GITHUB_OUTPUT"

      - name: Create PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update dependencies"
          title: "chore: update dependencies"
          body-path: /tmp/pr-body.md
          branch: auto-update/deps-${{ github.run_number }}
          labels: automated, dependencies
          delete-branch: true

  no-updates:
    needs: check-updates
    if: needs.check-updates.outputs.updates == '[]'
    runs-on: ubuntu-latest
    steps:
      - run: echo "All dependencies up to date"
